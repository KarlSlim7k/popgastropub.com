version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: pop_perote_mariadb
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=pop_perote
      - MYSQL_USER=pop_user
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - pop_db_data:/var/lib/mysql
    networks:
      - pop_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pop_perote_frontend
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://api.popgastropub.com}
    networks:
      - pop_network
      - dokploy-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pop_perote_backend
    restart: unless-stopped
    expose:
      - "9000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=pop_perote
      - DB_USERNAME=pop_user
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./backend/storage:/var/www/html/storage
      - ./backend/bootstrap/cache:/var/www/html/bootstrap/cache
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - pop_network

  nginx:
    image: nginx:alpine
    container_name: pop_perote_nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend:/var/www/html:ro
    depends_on:
      - frontend
      - backend
    networks:
      - pop_network
      - dokploy-network
      - default
    labels:
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-4-web.rule=Host(`api.popgastropub.com`)
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-4-web.entrypoints=web
      - traefik.http.services.popperoteweb-sistemapopperote-4hogw4-4-web.loadbalancer.server.port=80
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-4-web.service=popperoteweb-sistemapopperote-4hogw4-4-web
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-4-web.middlewares=redirect-to-https@file
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-4-websecure.rule=Host(`api.popgastropub.com`)
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-4-websecure.entrypoints=websecure
      - traefik.http.services.popperoteweb-sistemapopperote-4hogw4-4-websecure.loadbalancer.server.port=80
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-4-websecure.service=popperoteweb-sistemapopperote-4hogw4-4-websecure
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-4-websecure.tls.certresolver=letsencrypt
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-3-web.rule=Host(`popgastropub.com`)
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-3-web.entrypoints=web
      - traefik.http.services.popperoteweb-sistemapopperote-4hogw4-3-web.loadbalancer.server.port=80
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-3-web.service=popperoteweb-sistemapopperote-4hogw4-3-web
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-3-web.middlewares=redirect-to-https@file
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-3-websecure.rule=Host(`popgastropub.com`)
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-3-websecure.entrypoints=websecure
      - traefik.http.services.popperoteweb-sistemapopperote-4hogw4-3-websecure.loadbalancer.server.port=80
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-3-websecure.service=popperoteweb-sistemapopperote-4hogw4-3-websecure
      - traefik.http.routers.popperoteweb-sistemapopperote-4hogw4-3-websecure.tls.certresolver=letsencrypt
      - traefik.enable=true

networks:
  pop_network:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  pop_db_data:
    driver: local
