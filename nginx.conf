events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Frontend (Next.js)
    server {
        listen 80;
        server_name popgastropub.com www.popgastropub.com;

        location / {
            # Docker can recreate the frontend container with a new IP after deploys.
            # Use runtime DNS resolution so nginx does not keep a stale upstream address.
            set $frontend_upstream http://frontend:3000;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # Backend (Laravel API)
    server {
        listen 80;
        server_name api.popgastropub.com;

        root /var/www/html/public;

        index index.php index.html;

        location / {
            # CORS preflight: handle at nginx level so OPTIONS never reaches PHP
            # and works even when backend container is restarting after a deploy.
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' 'https://popgastropub.com';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With, X-XSRF-TOKEN';
                add_header 'Access-Control-Allow-Credentials' 'true';
                return 204;
            }
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ \.php$ {
            # Use variable to force runtime DNS re-resolution after redeploys.
            # Without this nginx caches the backend IP and returns 502 after container restarts.
            set $backend_upstream "backend:9000";
            fastcgi_pass $backend_upstream;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        location /api/ {
            if ($request_method = OPTIONS) {
                add_header 'Access-Control-Allow-Origin' 'https://popgastropub.com';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, X-Requested-With, X-XSRF-TOKEN';
                add_header 'Access-Control-Allow-Credentials' 'true';
                return 204;
            }
            try_files $uri $uri/ /index.php?$query_string;
        }

        location ~ /\.ht {
            deny all;
        }
    }
}
